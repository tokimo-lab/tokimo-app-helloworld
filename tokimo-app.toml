# Tokimo app manifest（供主 server 读取，注册 / spawn / 资源代理 / launchpad 展示）
[app]
id          = "helloworld"
display     = "HelloWorld"
version     = "0.1.0"
description = "示例 app"

[runtime]
lifecycle    = "on-demand"
binary       = "tokimo-app-helloworld"
ui_dist      = "ui/dist"

[ui]
entry        = "assets/index.js"
window_type  = "helloworld"
category     = "app"
icon         = "Sparkles"
color        = "#10b981"
width        = 600
height       = 400
